<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Projects & Tasks — DOME™</title>
<link rel="stylesheet" href="dims-shared.css">
</head><body>
<div class="page-header">
  <div><div class="page-title">✅ Projects & Tasks</div><div class="page-sub">Track projects, tasks, and activities</div></div>
  <a href="index.html" style="color:var(--gold);font-size:.8rem;border:1px solid var(--gold3);padding:6px 12px;text-decoration:none">← Home</a>
</div>
<nav class="nav-pills">
  <a class="nav-pill" href="mission-control.html">🎯 Mission Control</a>
  <a class="nav-pill active" href="projects-tasks.html">✅ Projects & Tasks</a>
  <a class="nav-pill" href="institutional-queue.html">⏳ Inst. Queue</a>
  <a class="nav-pill" href="dashboard-v3.html">⚙ System</a>
</nav>
<div class="wrap">
  <div class="card">
    <div class="card-title">📂 Projects <span id="projCount" style="color:var(--muted);font-size:.8rem"></span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:10px 0 14px">
      <input id="projectSearch" type="search" placeholder="Search projects..." oninput="filterProjectRows()" style="width:100%">
      <select id="projectStatusFilter" onchange="filterProjectRows()"><option value="">All status</option><option value="open">Open</option><option value="active">Active</option><option value="in_progress">In Progress</option><option value="complete">Complete</option><option value="completed">Completed</option><option value="deferred">Deferred</option></select>
      <select id="projectPriorityFilter" onchange="filterProjectRows()"><option value="">All priority</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
    </div>
    <div id="projectsList" class="loading">Loading…</div>
  </div>
  <div class="card">
    <div class="card-title">✅ Tasks <span id="taskCount" style="color:var(--muted);font-size:.8rem"></span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:10px 0 14px">
      <input id="taskSearch" type="search" placeholder="Search tasks and notes..." oninput="filterTaskRows()" style="width:100%">
      <select id="taskStatusFilter" onchange="filterTaskRows()"><option value="">All status</option><option value="open">Open</option><option value="active">Active</option><option value="in_progress">In Progress</option><option value="complete">Complete</option><option value="completed">Completed</option><option value="deferred">Deferred</option></select>
      <select id="taskPriorityFilter" onchange="filterTaskRows()"><option value="">All priority</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
    </div>
    <div id="tasksList" class="loading">Loading…</div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">+ Add Project</div>
      <input id="p_title" placeholder="Project title">
      <input id="p_desc" placeholder="Description">
      <select id="p_status"><option value="open">Open</option><option value="active">Active</option><option value="in_progress">In Progress</option><option value="complete">Complete</option><option value="deferred">Deferred</option></select>
      <select id="p_priority"><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
      <input id="p_stream" placeholder="Stream (e.g. DIMS, VAULT)">
      <button class="btn" onclick="saveProject()">💾 Save Project</button>
      <span id="pMsg" class="loading" style="margin-left:8px"></span>
    </div>
    <div class="card">
      <div class="card-title">+ Add Task</div>
      <input id="t_title" placeholder="Task title">
      <input id="t_notes" placeholder="Notes">
      <select id="t_status"><option value="open">Open</option><option value="active">Active</option><option value="in_progress">In Progress</option><option value="complete">Complete</option><option value="deferred">Deferred</option></select>
      <select id="t_priority"><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
      <button class="btn" onclick="saveTask()">💾 Save Task</button>
      <span id="tMsg" class="loading" style="margin-left:8px"></span>
    </div>
  </div>
</div>
<div class="scripture-bar">"Commit your works to the Lord, and your thoughts will be established." <strong>— Proverbs 16:3</strong></div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient('https://sdquzhsylqpbhrmqjqgk.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkcXV6aHN5bHFwYmhybXFqcWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTA4MzYsImV4cCI6MjA5NjU4NjgzNn0.MKwTvnLQ5Xr1vl-L0ngrJ5yi73-uPaaJUGyUggKEo1Y');
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmt(d){return d?new Date(d).toLocaleDateString():'—'}
function badge(s){const v=(s||'').toLowerCase();if(v.includes('active')||v.includes('progress'))return`<span class="badge badge-amber">${esc(s)}</span>`;if(v.includes('complete'))return`<span class="badge badge-blue">${esc(s)}</span>`;if(v.includes('deferred'))return`<span class="badge badge-grey">${esc(s)}</span>`;return`<span class="badge badge-green">${esc(s)}</span>`;}
function pri(p){const v=(p||'').toLowerCase();if(v==='high')return'<span class="badge badge-amber">👑 High</span>';if(v==='low')return'<span class="badge badge-grey">Low</span>';return'<span class="badge badge-blue">Medium</span>';}

async function loadProjects(){
  const {data,error}=await sb.from('projects').select('*').order('created_at',{ascending:false});
  const el=document.getElementById('projectsList');
  if(error||!data?.length){el.innerHTML=`<span class="loading">${error?error.message:'No projects found.'}</span>`;return;}
  document.getElementById('projCount').textContent=`(${data.length})`;
  el.innerHTML=`<table><thead><tr><th>#</th><th>Project</th><th>Stream</th><th>Status</th><th>Priority</th><th>Start</th><th>Target</th><th>Progress</th></tr></thead><tbody>`+
    data.map((p,i)=>`<tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td><strong>${esc(p.title)}</strong>${p.description?`<div class="row-meta">${esc(p.description.substring(0,60))}${p.description.length>60?'…':''}</div>`:''}</td>
      <td class="row-meta">${esc(p.stream||'—')}</td>
      <td>${badge(p.status||'open')}</td>
      <td>${pri(p.priority)}</td>
      <td class="row-meta">${fmt(p.start_date)}</td>
      <td class="row-meta">${fmt(p.target_date)}</td>
      <td><div class="progress-bar"><div class="progress-fill" style="width:${p.percent_complete||0}%"></div></div><div class="row-meta">${p.percent_complete||0}%</div></td>
    </tr>`).join('')+'</tbody></table>';
}

async function loadTasks(){
  const {data,error}=await sb.from('tasks').select('*').order('created_at',{ascending:false});
  const el=document.getElementById('tasksList');
  if(error||!data?.length){el.innerHTML=`<span class="loading">${error?error.message:'No tasks found.'}</span>`;return;}
  document.getElementById('taskCount').textContent=`(${data.length})`;
  el.innerHTML=`<table><thead><tr><th>#</th><th>Task</th><th>Status</th><th>Priority</th><th>Start</th><th>Target</th><th>Progress</th><th>Notes</th></tr></thead><tbody>`+
    data.map((t,i)=>`<tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td><strong>${esc(t.title)}</strong></td>
      <td>${badge(t.status||'open')}</td>
      <td>${pri(t.priority)}</td>
      <td class="row-meta">${fmt(t.start_date)}</td>
      <td class="row-meta">${fmt(t.target_date)}</td>
      <td><div class="progress-bar"><div class="progress-fill" style="width:${t.percent_complete||0}%"></div></div><div class="row-meta">${t.percent_complete||0}%</div></td>
      <td class="row-meta">${esc(t.notes||'')}</td>
    </tr>`).join('')+'</tbody></table>';
}

window.saveProject=async function(){
  const title=document.getElementById('p_title').value.trim();
  if(!title){document.getElementById('pMsg').textContent='Title required.';return;}
  const {error}=await sb.from('projects').insert({title,description:document.getElementById('p_desc').value,status:document.getElementById('p_status').value,priority:document.getElementById('p_priority').value,stream:document.getElementById('p_stream').value,created_at:new Date().toISOString()});
  document.getElementById('pMsg').textContent=error?`Error: ${error.message}`:'Saved ✅';
  if(!error){['p_title','p_desc','p_stream'].forEach(id=>document.getElementById(id).value='');loadProjects();}
};

window.saveTask=async function(){
  const title=document.getElementById('t_title').value.trim();
  if(!title){document.getElementById('tMsg').textContent='Title required.';return;}
  const {error}=await sb.from('tasks').insert({title,notes:document.getElementById('t_notes').value,status:document.getElementById('t_status').value,priority:document.getElementById('t_priority').value,created_at:new Date().toISOString()});
  document.getElementById('tMsg').textContent=error?`Error: ${error.message}`:'Saved ✅';
  if(!error){['t_title','t_notes'].forEach(id=>document.getElementById(id).value='');loadTasks();}
};

window.filterProjectRows=function(){
  const query=String(document.getElementById('projectSearch')?.value||'').trim().toLowerCase();
  const status=String(document.getElementById('projectStatusFilter')?.value||'').trim().toLowerCase();
  const priority=String(document.getElementById('projectPriorityFilter')?.value||'').trim().toLowerCase();
  const rows=document.querySelectorAll('#projectsList tbody tr');
  let visible=0;
  rows.forEach(row=>{
    const text=row.textContent.toLowerCase();
    const cells=row.querySelectorAll('td');
    const rowStatus=String(cells[3]?.textContent||'').trim().toLowerCase();
    const rowPriority=String(cells[4]?.textContent||'').trim().toLowerCase();
    const matchesSearch=!query||text.includes(query);
    const matchesStatus=!status||rowStatus.includes(status.replace('_',' '));
    const matchesPriority=!priority||rowPriority.includes(priority);
    const matches=matchesSearch&&matchesStatus&&matchesPriority;
    row.style.display=matches?'':'none';
    if(matches)visible++;
  });
  const count=document.getElementById('projCount');
  if(count&&rows.length)count.textContent=(query||status||priority)?`(${visible} of ${rows.length})`:`(${rows.length})`;
};

window.filterTaskRows=function(){
  const query=String(document.getElementById('taskSearch')?.value||'').trim().toLowerCase();
  const status=String(document.getElementById('taskStatusFilter')?.value||'').trim().toLowerCase();
  const priority=String(document.getElementById('taskPriorityFilter')?.value||'').trim().toLowerCase();
  const rows=document.querySelectorAll('#tasksList tbody tr');
  let visible=0;
  rows.forEach(row=>{
    const text=row.textContent.toLowerCase();
    const cells=row.querySelectorAll('td');
    const rowStatus=String(cells[2]?.textContent||'').trim().toLowerCase();
    const rowPriority=String(cells[3]?.textContent||'').trim().toLowerCase();
    const matchesSearch=!query||text.includes(query);
    const matchesStatus=!status||rowStatus.includes(status.replace('_',' '));
    const matchesPriority=!priority||rowPriority.includes(priority);
    const matches=matchesSearch&&matchesStatus&&matchesPriority;
    row.style.display=matches?'':'none';
    if(matches)visible++;
  });
  const count=document.getElementById('taskCount');
  if(count&&rows.length)count.textContent=(query||status||priority)?`(${visible} of ${rows.length})`:`(${rows.length})`;
};

Promise.all([loadProjects(),loadTasks()]);
</script>
</body></html>
