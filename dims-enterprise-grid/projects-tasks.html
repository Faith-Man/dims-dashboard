<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Projects & Tasks — DOME™</title><link rel="stylesheet" href="dims-shared.css"><link rel="stylesheet" href="dims-grid.css"></head><body><div class="page-header"><div><div class="page-title">✅ Projects & Tasks</div><div class="page-sub">Track projects, tasks, and activities</div></div><a href="index.html" style="color:var(--gold);font-size:.8rem;border:1px solid var(--gold3);padding:6px 12px;text-decoration:none">← Home</a></div><nav class="nav-pills"><a class="nav-pill" href="mission-control.html">🎯 Mission Control</a><a class="nav-pill active" href="projects-tasks.html">✅ Projects & Tasks</a><a class="nav-pill" href="institutional-queue.html">⏳ Inst. Queue</a><a class="nav-pill" href="dashboard-v3.html">⚙ System</a></nav><div class="wrap"><div class="card"><div class="card-title">📂 Projects <span id="projCount" style="color:var(--muted);font-size:.8rem"></span></div><input id="projectSearch" class="dims-grid-search" type="search" placeholder="Search projects..."><div id="projectsList" class="loading">Loading…</div></div><div class="card"><div class="card-title">✅ Tasks <span id="taskCount" style="color:var(--muted);font-size:.8rem"></span></div><input id="taskSearch" class="dims-grid-search" type="search" placeholder="Search tasks and notes..."><div id="tasksList" class="loading">Loading…</div></div><div class="grid2"><div class="card"><div class="card-title">+ Add Project</div><input id="p_title" placeholder="Project title"><input id="p_desc" placeholder="Description"><select id="p_status"><option value="open">Open</option><option value="active">Active</option><option value="in_progress">In Progress</option><option value="complete">Complete</option><option value="deferred">Deferred</option></select><select id="p_priority"><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select><input id="p_stream" placeholder="Stream (e.g. DIMS, VAULT)"><button class="btn" onclick="saveProject()">💾 Save Project</button><span id="pMsg" class="loading" style="margin-left:8px"></span></div><div class="card"><div class="card-title">+ Add Task</div><input id="t_title" placeholder="Task title"><input id="t_notes" placeholder="Notes"><select id="t_status"><option value="open">Open</option><option value="active">Active</option><option value="in_progress">In Progress</option><option value="complete">Complete</option><option value="deferred">Deferred</option></select><select id="t_priority"><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select><button class="btn" onclick="saveTask()">💾 Save Task</button><span id="tMsg" class="loading" style="margin-left:8px"></span></div></div></div><div class="scripture-bar">"Commit your works to the Lord, and your thoughts will be established." <strong>— Proverbs 16:3</strong></div><script type="module">import{createClient}from'https://esm.sh/@supabase/supabase-js@2';import{DIMSGrid}from'./dims-grid.js';const sb=createClient('https://sdquzhsylqpbhrmqjqgk.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkcXV6aHN5bHFwYmhybXFqcWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTA4MzYsImV4cCI6MjA5NjU4NjgzNn0.MKwTvnLQ5Xr1vl-L0ngrJ5yi73-uPaaJUGyUggKEo1Y');function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function fmt(d){return d?new Date(d).toLocaleDateString():'—'}function badge(s){const v=String(s||'').toLowerCase();if(v.includes('active')||v.includes('progress'))return`<span class="badge badge-amber">${esc(s)}</span>`;if(v.includes('complete'))return`<span class="badge badge-blue">${esc(s)}</span>`;if(v.includes('deferred'))return`<span class="badge badge-grey">${esc(s)}</span>`;return`<span class="badge badge-green">${esc(s||'open')}</span>`}function pri(p){const v=String(p||'').toLowerCase();if(v==='high')return'<span class="badge badge-amber">👑 High</span>';if(v==='low')return'<span class="badge badge-grey">Low</span>';return'<span class="badge badge-blue">Medium</span>'}let pg,tg;async function loadProjects(){const{data,error}=await sb.from('projects').select('*').order('created_at',{ascending:false});const el=document.getElementById('projectsList');if(error){el.innerHTML=`<span class="loading">${esc(error.message)}</span>`;return}const rows=data||[];document.getElementById('projCount').textContent=`(${rows.length})`;const cols=[{key:'title',label:'Project',render:p=>`<strong>${esc(p.title)}</strong>${p.description?`<div class="row-meta">${esc(p.description)}</div>`:''}`},{key:'stream',label:'Stream',value:p=>p.stream||'—'},{key:'status',label:'Status',render:p=>badge(p.status||'open')},{key:'priority',label:'Priority',render:p=>pri(p.priority)},{key:'project_type',label:'Project Type',value:p=>p.project_type||'operational'},{key:'start_date',label:'Start',value:p=>fmt(p.start_date)},{key:'target_date',label:'Target',value:p=>fmt(p.target_date)},{key:'percent_complete',label:'Progress',render:p=>`<div class="progress-bar"><div class="progress-fill" style="width:${p.percent_complete||0}%"></div></div><div class="row-meta">${p.percent_complete||0}%</div>`}];pg?pg.setRows(rows):pg=new DIMSGrid({container:'#projectsList',searchInput:'#projectSearch',columns:cols,rows})}async function loadTasks(){const{data,error}=await sb.from('tasks').select('*').order('created_at',{ascending:false});const el=document.getElementById('tasksList');if(error){el.innerHTML=`<span class="loading">${esc(error.message)}</span>`;return}const rows=data||[];document.getElementById('taskCount').textContent=`(${rows.length})`;const cols=[{key:'title',label:'Task',render:t=>`<strong>${esc(t.title)}</strong>`},{key:'status',label:'Status',render:t=>badge(t.status||'open')},{key:'priority',label:'Priority',render:t=>pri(t.priority)},{key:'task_type',label:'Task Type',value:t=>t.task_type||'operational'},{key:'start_date',label:'Start',value:t=>fmt(t.start_date)},{key:'target_date',label:'Target',value:t=>fmt(t.target_date)},{key:'percent_complete',label:'Progress',render:t=>`<div class="progress-bar"><div class="progress-fill" style="width:${t.percent_complete||0}%"></div></div><div class="row-meta">${t.percent_complete||0}%</div>`},{key:'notes',label:'Notes',value:t=>t.notes||'—'}];tg?tg.setRows(rows):tg=new DIMSGrid({container:'#tasksList',searchInput:'#taskSearch',columns:cols,rows})}window.saveProject=async function(){const title=document.getElementById('p_title').value.trim();if(!title){document.getElementById('pMsg').textContent='Title required.';return}const{error}=await sb.from('projects').insert({title,description:document.getElementById('p_desc').value,status:document.getElementById('p_status').value,priority:document.getElementById('p_priority').value,stream:document.getElementById('p_stream').value,created_at:new Date().toISOString()});document.getElementById('pMsg').textContent=error?`Error: ${error.message}`:'Saved ✅';if(!error){['p_title','p_desc','p_stream'].forEach(id=>document.getElementById(id).value='');loadProjects()}};window.saveTask=async function(){const title=document.getElementById('t_title').value.trim();if(!title){document.getElementById('tMsg').textContent='Title required.';return}const{error}=await sb.from('tasks').insert({title,notes:document.getElementById('t_notes').value,status:document.getElementById('t_status').value,priority:document.getElementById('t_priority').value,created_at:new Date().toISOString()});document.getElementById('tMsg').textContent=error?`Error: ${error.message}`:'Saved ✅';if(!error){['t_title','t_notes'].forEach(id=>document.getElementById(id).value='');loadTasks()}};Promise.all([loadProjects(),loadTasks()]);</script></body></html>
