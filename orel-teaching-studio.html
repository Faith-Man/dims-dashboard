<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OrEl Content Studio</title>
<style>
body{font-family:system-ui,Arial;margin:0;background:#eef5ff;color:#0b1733}
header{background:#0C1475;color:white;padding:18px}
main{max-width:1200px;margin:0 auto;padding:16px}
.grid{display:grid;grid-template-columns:340px 1fr;gap:14px}
.card{background:white;border:1px solid #c8d8ff;border-radius:14px;padding:14px}
input,textarea,select{width:100%;padding:10px;margin:6px 0;border:1px solid #c8d8ff;border-radius:9px}
textarea{min-height:150px}
#content_md{min-height:300px}
button{background:#0C1475;color:white;border:0;border-radius:10px;padding:10px 14px;margin:4px;cursor:pointer}
button:hover{outline:2px solid #FFD700}
.item{padding:10px;border-bottom:1px solid #ddd;cursor:pointer}
.item:hover{background:#f4f8ff}
.small{color:#5b6b8d;font-size:.9rem}
.preview{background:#fff;border:1px solid #c8d8ff;border-radius:14px;padding:18px;margin-top:14px;display:none;white-space:pre-wrap;line-height:1.55}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
@media print{
  header,.grid .card:first-child,button,input,select,textarea,#msg{display:none!important}
  body{background:white}
  .preview{display:block!important;border:0}
}
</style>
</head>
<body>
<header>
<h1>💡 OrEl Content Studio</h1>
<div>DIMS-v3 • Create, edit, classify, review, print, and export Dominion1st content</div>
</header>

<main>
<div class="grid">
<section class="card">
<h2>📚 Content Library</h2>
<input id="search" placeholder="Search content...">
<div id="list">Loading...</div>
</section>

<section class="card">
<h2>✍ Content Editor</h2>

<input id="title" placeholder="Title">
<input id="slug" placeholder="slug-auto-created">

<select id="status">
<option value="draft">Draft</option>
<option value="published">Published</option>
<option value="archived">Archived</option>
</select>

<select id="content_type">
<option value="Teaching">📖 Teaching</option>
<option value="Diagnosis">🔍 Diagnosis</option>
<option value="Perspective">🔥 Perspective</option>
<option value="Principle">🏛 Principle</option>
<option value="Briefing">📰 Briefing</option>
</select>

<select id="category">
<option value="">Select Category</option>
<option value="Identity">Identity</option>
<option value="Dominion">Dominion</option>
<option value="Kingdom">Kingdom</option>
<option value="Grace">Grace</option>
<option value="Faith">Faith</option>
<option value="Leadership">Leadership</option>
<option value="Culture">Culture</option>
<option value="Prophecy">Prophecy</option>
<option value="End Times">End Times</option>
<option value="Character">Character</option>
<option value="Other">Other</option>
</select>

<input id="series" placeholder="Series Name">
<input id="tags" placeholder="tags separated by commas">

<textarea id="summary" placeholder="Summary (50-150 words)"></textarea>
<textarea id="content_md" placeholder="Write content here..."></textarea>

<button onclick="newTeaching()">New</button>
<button onclick="autoFillMetadata()">✨ Auto-Fill Metadata</button>
<button onclick="saveTeaching('draft')">Save Draft</button>
<button onclick="saveTeaching('published')">Publish</button>
<button onclick="archiveTeaching()">Archive</button>
<button onclick="previewContent()">👁 Preview</button>
<button onclick="printContent()">🖨 Print</button>
<button onclick="exportMarkdown()">⬇ Export MD</button>
<button onclick="exportJSON()">⬇ Export JSON</button>
<button onclick="exportHTML()">⬇ Export HTML</button>

<p id="msg" class="small"></p>
<div id="preview" class="preview"></div>
</section>
</div>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://sdquzhsylqpbhrmqjqgk.supabase.co',
  'sb_publishable_volaz6N52Pc4rdh8a4dfEw_MjJ73How'
);

let teachings = [];
let currentId = null;

window.newTeaching = newTeaching;
window.saveTeaching = saveTeaching;
window.archiveTeaching = archiveTeaching;
window.autoFillMetadata = autoFillMetadata;
window.previewContent = previewContent;
window.printContent = printContent;
window.exportMarkdown = exportMarkdown;
window.exportJSON = exportJSON;
window.exportHTML = exportHTML;

function slugify(s){
  return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}

function esc(s){
  return String(s ?? '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function typeIcon(type){
  if(type === 'Diagnosis') return '🔍';
  if(type === 'Perspective') return '🔥';
  if(type === 'Principle') return '🏛';
  if(type === 'Briefing') return '📰';
  return '📖';
}

function getEditorData(){
  return {
    id: currentId,
    title: document.getElementById('title').value.trim(),
    slug: document.getElementById('slug').value.trim(),
    status: document.getElementById('status').value,
    content_type: document.getElementById('content_type').value,
    category: document.getElementById('category').value,
    series: document.getElementById('series').value.trim(),
    tags: document.getElementById('tags').value.split(',').map(x=>x.trim()).filter(Boolean),
    summary: document.getElementById('summary').value.trim(),
    content_md: document.getElementById('content_md').value
  };
}

async function loadTeachings(){
  const {data,error}=await supabase
    .from('teachings')
    .select('*')
    .order('updated_at',{ascending:false});

  if(error){
    document.getElementById('list').textContent='Error: '+error.message;
    return;
  }

  teachings=data||[];
  renderList();
}

function renderList(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const filtered=teachings.filter(t=>{
    const text=[
      t.title,t.status,t.content_type,t.category,t.series,t.summary,
      ...(t.tags||[]),t.content_md
    ].join(' ').toLowerCase();
    return !q || text.includes(q);
  });

  if(!filtered.length){
    document.getElementById('list').innerHTML='<div class="small">No content found.</div>';
    return;
  }

  document.getElementById('list').innerHTML=filtered.map(t=>`
    <div class="item" data-id="${esc(t.id)}">
      <strong>${typeIcon(t.content_type)} ${esc(t.content_type||'Teaching')} — ${esc(t.title||'Untitled')}</strong><br>
      <span class="small">${esc(t.status||'draft')} · ${esc(t.category||'Uncategorized')} · ${esc(t.series||'Standalone')}</span>
    </div>
  `).join('');

  document.querySelectorAll('.item').forEach(el=>{
    el.onclick=()=>{
      const t=teachings.find(x=>String(x.id)===el.dataset.id);
      fillEditor(t);
    };
  });
}

function fillEditor(t){
  currentId=t.id;
  document.getElementById('title').value=t.title||'';
  document.getElementById('slug').value=t.slug||t.id||'';
  document.getElementById('status').value=t.status||'draft';
  document.getElementById('content_type').value=t.content_type||'Teaching';
  document.getElementById('category').value=t.category||'';
  document.getElementById('series').value=t.series||'';
  document.getElementById('tags').value=(t.tags||[]).join(', ');
  document.getElementById('summary').value=t.summary||'';
  document.getElementById('content_md').value=t.content_md||'';
  document.getElementById('preview').style.display='none';
  document.getElementById('msg').textContent='Loaded.';
}

function newTeaching(){
  currentId=null;
  document.getElementById('title').value='';
  document.getElementById('slug').value='';
  document.getElementById('status').value='draft';
  document.getElementById('content_type').value='Teaching';
  document.getElementById('category').value='';
  document.getElementById('series').value='';
  document.getElementById('tags').value='';
  document.getElementById('summary').value='';
  document.getElementById('content_md').value='';
  document.getElementById('preview').style.display='none';
  document.getElementById('msg').textContent='New content.';
}

function autoFillMetadata(){
  const title=document.getElementById('title').value.trim();
  const content=document.getElementById('content_md').value.trim();
  const all=(title+' '+content).toLowerCase();

  if(title && !document.getElementById('slug').value.trim()){
    document.getElementById('slug').value=slugify(title);
  }

  if(!document.getElementById('summary').value.trim() && content){
    const clean=content.replace(/\s+/g,' ').trim();
    const sentences=clean.match(/[^.!?]+[.!?]+/g);
    document.getElementById('summary').value=(sentences?sentences.slice(0,2).join(' '):clean.slice(0,260)).trim();
  }

  if(!document.getElementById('category').value){
    if(all.includes('identity')||all.includes('image')||all.includes('likeness')) document.getElementById('category').value='Identity';
    else if(all.includes('dominion')||all.includes('authority')||all.includes('rule')) document.getElementById('category').value='Dominion';
    else if(all.includes('grace')||all.includes('mercy')) document.getElementById('category').value='Grace';
    else if(all.includes('faith')||all.includes('believe')) document.getElementById('category').value='Faith';
    else if(all.includes('culture')||all.includes('government')||all.includes('society')||all.includes('justice')) document.getElementById('category').value='Culture';
    else if(all.includes('prophecy')||all.includes('prophetic')) document.getElementById('category').value='Prophecy';
    else if(all.includes('leadership')||all.includes('leader')) document.getElementById('category').value='Leadership';
    else document.getElementById('category').value='Other';
  }

  if(!document.getElementById('series').value.trim()){
    if(all.includes('the connection')) document.getElementById('series').value='The Connection';
    else if(all.includes('perfect man')) document.getElementById('series').value='The Perfect Man';
    else if(all.includes('divine design')) document.getElementById('series').value="God's Divine Design";
    else if(all.includes('dominion revolution')) document.getElementById('series').value='The Dominion Revolution';
    else document.getElementById('series').value='Standalone';
  }

  if(!document.getElementById('tags').value.trim()){
    const tags=[];
    ['identity','dominion','faith','grace','mercy','truth','justice','kingdom','culture','leadership','prophecy','authority','purpose'].forEach(k=>{
      if(all.includes(k)) tags.push(k);
    });
    document.getElementById('tags').value=[...new Set(tags)].join(', ');
  }

  document.getElementById('msg').textContent='Metadata auto-filled ✅';
}

async function saveTeaching(forceStatus){
  const d=getEditorData();
  const title=d.title;
  const slug=d.slug || slugify(title);
  const status=forceStatus || d.status;

  if(!title){
    document.getElementById('msg').textContent='Title is required.';
    return;
  }

  const row={
    id: currentId || slug,
    slug,
    title,
    status,
    content_type:d.content_type,
    category:d.category,
    series:d.series,
    tags:d.tags,
    summary:d.summary,
    content_md:d.content_md,
    published_date: status === 'published' ? new Date().toISOString().slice(0,10) : null,
    archived_at: status === 'archived' ? new Date().toISOString() : null,
    updated_at:new Date().toISOString()
  };

  document.getElementById('msg').textContent='Saving...';

  const {error}=await supabase
    .from('teachings')
    .upsert(row,{onConflict:'id'});

  if(error){
    document.getElementById('msg').textContent='Error: '+error.message;
    return;
  }

  currentId=row.id;
  document.getElementById('slug').value=slug;
  document.getElementById('status').value=status;
  document.getElementById('msg').textContent=status==='published'?'Published ✅':'Saved ✅';
  await loadTeachings();
}

async function archiveTeaching(){
  if(!currentId){
    document.getElementById('msg').textContent='No content selected.';
    return;
  }
  document.getElementById('status').value='archived';
  await saveTeaching('archived');
}

function previewContent(){
  const d=getEditorData();
  const html=`<h1>${esc(d.title||'Untitled')}</h1>
<p><strong>${esc(d.content_type)}</strong> · ${esc(d.category||'Uncategorized')} · ${esc(d.series||'Standalone')}</p>
<p><em>${esc(d.summary||'')}</em></p>
<hr>
<div>${esc(d.content_md||'').replace(/\n/g,'<br>')}</div>`;
  const box=document.getElementById('preview');
  box.innerHTML=html;
  box.style.display='block';
}

function printContent(){
  previewContent();
  window.print();
}

function download(filename,text,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type}));
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function exportMarkdown(){
  const d=getEditorData();
  const md=`# ${d.title}

**Type:** ${d.content_type}  
**Category:** ${d.category}  
**Series:** ${d.series}  
**Status:** ${d.status}  
**Tags:** ${d.tags.join(', ')}

## Summary

${d.summary}

---

${d.content_md}`;
  download((d.slug||slugify(d.title)||'content')+'.md',md,'text/markdown');
}

function exportJSON(){
  const d=getEditorData();
  download((d.slug||slugify(d.title)||'content')+'.json',JSON.stringify(d,null,2),'application/json');
}

function exportHTML(){
  const d=getEditorData();
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>${esc(d.title)}</title></head><body>
<h1>${esc(d.title)}</h1>
<p><strong>${esc(d.content_type)}</strong> · ${esc(d.category)} · ${esc(d.series)}</p>
<p><em>${esc(d.summary)}</em></p>
<hr>
<div>${esc(d.content_md).replace(/\n/g,'<br>')}</div>
</body></html>`;
  download((d.slug||slugify(d.title)||'content')+'.html',html,'text/html');
}

document.getElementById('title').addEventListener('input',()=>{
  const slug=document.getElementById('slug');
  if(!slug.value.trim()) slug.value=slugify(document.getElementById('title').value);
});

document.getElementById('search').addEventListener('input',renderList);

loadTeachings();
</script>
</body>
</html>
