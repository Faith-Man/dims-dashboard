<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NESHAMAH — DOME™</title>
<link rel="stylesheet" href="dims-shared.css">
</head><body>
<div class="page-header">
  <div><div class="page-title">💨 NESHAMAH</div><div class="page-sub">Inspiration, revelation, and creative development — Job 32:8</div></div>
  <a href="index.html" style="color:var(--gold);font-size:.8rem;border:1px solid var(--gold3);padding:6px 12px;text-decoration:none">← Home</a>
</div>
<nav class="nav-pills">
  <a class="nav-pill" href="mission-control.html">🎯 Mission Control</a>
  <a class="nav-pill active" href="neshamah.html">💨 NESHAMAH</a>
  <a class="nav-pill" href="teaching-library-v3.html">📖 Teaching Center</a>
  <a class="nav-pill" href="dashboard-v3.html">⚙ System</a>
</nav>
<div class="wrap">
  <div class="card">
    <div class="card-title">💨 NESHAMAH Records <span id="nCount" style="color:var(--muted);font-size:.8rem"></span></div>
    <div id="neshamahList" class="loading">Loading…</div>
  </div>
  <div class="card">
    <div class="card-title">+ New NESHAMAH Record</div>
    <input id="n_title" placeholder="Title / Subject">
    <div class="grid2">
      <textarea id="n_logos" placeholder="Logos Word — Written Word insight…" style="min-height:80px"></textarea>
      <textarea id="n_rhema" placeholder="Rhema Word — Spoken/revealed Word…" style="min-height:80px"></textarea>
    </div>
    <textarea id="n_understanding" placeholder="Understanding — What this means…" style="min-height:60px"></textarea>
    <textarea id="n_directives" placeholder="Directives — What to do…" style="min-height:60px"></textarea>
    <textarea id="n_declaration" placeholder="Declaration — Confession of faith…" style="min-height:60px"></textarea>
    <input id="n_scripture" placeholder="Scripture reference (e.g. John 1:1)">
    <button class="btn" onclick="saveNeshamah()">💾 Save Record</button>
    <span id="nMsg" class="loading" style="margin-left:8px"></span>
  </div>
</div>
<div class="scripture-bar">"But there is a spirit in man, and the breath of the Almighty gives him understanding." <strong>— Job 32:8</strong></div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient('https://sdquzhsylqpbhrmqjqgk.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkcXV6aHN5bHFwYmhybXFqcWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTA4MzYsImV4cCI6MjA5NjU4NjgzNn0.MKwTvnLQ5Xr1vl-L0ngrJ5yi73-uPaaJUGyUggKEo1Y');
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmt(d){return d?new Date(d).toLocaleString():'—'}

async function loadNeshamah(){
  const {data}=await sb.from('neshamah_records').select('*').order('created_at',{ascending:false});
  const el=document.getElementById('neshamahList');
  if(!data?.length){el.innerHTML='<span class="loading">No NESHAMAH records yet.</span>';return;}
  document.getElementById('nCount').textContent=`(${data.length})`;
  el.innerHTML=data.map(n=>`<div class="row-item">
    <div class="row-title">${esc(n.title)}</div>
    ${n.scripture_reference?`<div style="color:var(--gold);font-size:.8rem;margin:3px 0">📖 ${esc(n.scripture_reference)}</div>`:''}
    ${n.logos_word?`<div style="margin:6px 0"><strong style="color:var(--gold);font-size:.8rem">LOGOS:</strong><div class="row-meta">${esc(n.logos_word.substring(0,120))}${n.logos_word.length>120?'…':''}</div></div>`:''}
    ${n.rhema_word?`<div style="margin:6px 0"><strong style="color:var(--gold);font-size:.8rem">RHEMA:</strong><div class="row-meta">${esc(n.rhema_word.substring(0,120))}${n.rhema_word.length>120?'…':''}</div></div>`:''}
    ${n.directives?`<div style="margin:6px 0"><strong style="color:var(--gold);font-size:.8rem">DIRECTIVES:</strong><div class="row-meta">${esc(n.directives.substring(0,100))}${n.directives.length>100?'…':''}</div></div>`:''}
    <div class="row-meta">${fmt(n.created_at)}</div>
  </div>`).join('');
}

window.saveNeshamah=async function(){
  const title=document.getElementById('n_title').value.trim();
  if(!title){document.getElementById('nMsg').textContent='Title required.';return;}
  const {error}=await sb.from('neshamah_records').insert({title,logos_word:document.getElementById('n_logos').value,rhema_word:document.getElementById('n_rhema').value,understanding:document.getElementById('n_understanding').value,directives:document.getElementById('n_directives').value,declaration:document.getElementById('n_declaration').value,scripture_reference:document.getElementById('n_scripture').value,status:'active',created_at:new Date().toISOString(),updated_at:new Date().toISOString()});
  document.getElementById('nMsg').textContent=error?`Error: ${error.message}`:'Saved ✅';
  if(!error){['n_title','n_logos','n_rhema','n_understanding','n_directives','n_declaration','n_scripture'].forEach(id=>document.getElementById(id).value='');loadNeshamah();}
};

loadNeshamah();
</script>
</body></html>
