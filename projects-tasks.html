  <style>
    /* DIMS Enterprise Grid — permanent-number display update */
    .dims-grid-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .dims-grid {
      width: 100%;
      min-width: 1080px;
      border-collapse: collapse;
    }

    .dims-grid th,
    .dims-grid td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      text-align: left;
      vertical-align: top;
    }

    .dims-grid th {
      white-space: nowrap;
      user-select: none;
    }

    .dims-grid-header {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .dims-grid-arrow {
      font-size: .62rem;
      opacity: .8;
    }

    .dims-grid-header.active .dims-grid-arrow {
      color: var(--gold);
    }

    .dims-grid-menu {
      position: fixed;
      z-index: 9999;
      min-width: 190px;
      max-width: 280px;
      max-height: 360px;
      overflow-y: auto;
      background: var(--panel, #071629);
      color: inherit;
      border: 1px solid var(--gold3);
      border-radius: 10px;
      box-shadow: 0 18px 40px rgba(0,0,0,.45);
      padding: 8px;
    }

    .dims-grid-menu button {
      display: block;
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: .8rem;
    }

    .dims-grid-menu button:hover {
      background: rgba(255,255,255,.07);
    }

    .dims-grid-menu .dims-grid-clear {
      color: var(--gold);
      border-top: 1px solid rgba(255,255,255,.08);
      margin-top: 5px;
      padding-top: 10px;
    }

    .dims-grid-empty {
      color: var(--muted);
      padding: 18px;
    }

    .dims-grid-search {
      width: 100%;
      margin: 10px 0 14px;
    }

    .permanent-number {
      color: var(--gold);
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: .02em;
    }
  </style>

function esc(value) {
  return String(value ?? '').replace(
    /[&<>"']/g,
    character => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[character])
  );
}

function fmt(value) {
  return value ? new Date(value).toLocaleDateString() : '—';
}

function badge(status) {
  const value = String(status || '').toLowerCase();

  if (value.includes('active') || value.includes('progress')) {
    return `<span class="badge badge-amber">${esc(status)}</span>`;
  }

  if (value.includes('complete')) {
    return `<span class="badge badge-blue">${esc(status)}</span>`;
  }

  if (value.includes('deferred') || value.includes('blocked')) {
    return `<span class="badge badge-grey">${esc(status)}</span>`;
  }

  return `<span class="badge badge-green">${esc(status || 'open')}</span>`;
}

function priorityBadge(priority) {
  const value = String(priority || '').toLowerCase();

  if (value === 'high') {
    return '<span class="badge badge-amber">👑 High</span>';
  }

  if (value === 'low') {
    return '<span class="badge badge-grey">Low</span>';
  }

  return '<span class="badge badge-blue">Medium</span>';
}

class DIMSGrid {
  constructor(options) {
    this.container = document.querySelector(options.container);
    this.searchInput = document.querySelector(options.searchInput);
    this.columns = options.columns || [];
    this.rows = options.rows || [];
    this.filters = {};
    this.sort = { key: null, direction: 'asc' };
    this.menu = null;

    if (!this.container) {
      throw new Error('DIMSGrid container not found.');
    }

    this.searchInput?.addEventListener('input', () => this.render());

    document.addEventListener('click', event => {
      if (
        this.menu &&
        !this.menu.contains(event.target) &&
        !event.target.closest('.dims-grid-header')
      ) {
        this.closeMenu();
      }
    });

    this.render();
  }

  setRows(rows) {
    this.rows = Array.isArray(rows) ? rows : [];
    this.render();
  }

  getCellValue(row, column) {
    return typeof column.value === 'function'
      ? column.value(row)
      : row[column.key] ?? '';
  }

  getFilteredRows() {
    const query = String(this.searchInput?.value || '')
      .trim()
      .toLowerCase();

    let data = this.rows.filter(row => {
      const searchMatch =
        !query ||
        this.columns.some(column =>
          String(this.getCellValue(row, column))
            .toLowerCase()
            .includes(query)
        );

      if (!searchMatch) {
        return false;
      }

      return Object.entries(this.filters).every(([key, expected]) => {
        const column = this.columns.find(item => item.key === key);

        if (!column) {
          return true;
        }

        return (
          String(this.getCellValue(row, column)).toLowerCase() ===
          String(expected).toLowerCase()
        );
      });
    });

    if (this.sort.key) {
      const column = this.columns.find(item => item.key === this.sort.key);

      data = [...data].sort((a, b) => {
        const av = this.getCellValue(a, column);
        const bv = this.getCellValue(b, column);

        const comparison = String(av).localeCompare(
          String(bv),
          undefined,
          { numeric: true, sensitivity: 'base' }
        );

        return this.sort.direction === 'asc'
          ? comparison
          : -comparison;
      });
    }

    return data;
  }

  openFilterMenu(column, headerElement) {
    this.closeMenu();

    const values = [
      ...new Set(
        this.rows
          .map(row => String(this.getCellValue(row, column)).trim())
          .filter(Boolean)
      )
    ].sort((a, b) =>
      a.localeCompare(b, undefined, {
        numeric: true,
        sensitivity: 'base'
      })
    );

    const menu = document.createElement('div');
    menu.className = 'dims-grid-menu';

    const sortAsc = document.createElement('button');
    sortAsc.textContent = 'Sort A → Z';
    sortAsc.onclick = () => {
      this.sort = { key: column.key, direction: 'asc' };
      this.closeMenu();
      this.render();
    };
    menu.appendChild(sortAsc);

    const sortDesc = document.createElement('button');
    sortDesc.textContent = 'Sort Z → A';
    sortDesc.onclick = () => {
      this.sort = { key: column.key, direction: 'desc' };
      this.closeMenu();
      this.render();
    };
    menu.appendChild(sortDesc);

    values.forEach(value => {
      const button = document.createElement('button');
      button.textContent =
        String(this.filters[column.key] ?? '') === value
          ? `✓ ${value}`
          : value;

      button.onclick = () => {
        this.filters[column.key] = value;
        this.closeMenu();
        this.render();
      };

      menu.appendChild(button);
    });

    const clear = document.createElement('button');
    clear.className = 'dims-grid-clear';
    clear.textContent = 'Clear filter';
    clear.onclick = () => {
      delete this.filters[column.key];
      this.closeMenu();
      this.render();
    };
    menu.appendChild(clear);

    document.body.appendChild(menu);

    const rect = headerElement.getBoundingClientRect();
    const left = Math.min(
      rect.left,
      window.innerWidth - menu.offsetWidth - 12
    );

    menu.style.left = `${Math.max(8, left)}px`;
    menu.style.top = `${rect.bottom + 5}px`;

    this.menu = menu;
  }

  closeMenu() {
    this.menu?.remove();
    this.menu = null;
  }

  render() {
    const data = this.getFilteredRows();

    this.container.innerHTML = '';

    if (!data.length) {
      const empty = document.createElement('div');
      empty.className = 'dims-grid-empty';
      empty.textContent = 'No matching records found.';
      this.container.appendChild(empty);
      return;
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'dims-grid-wrap';

    const table = document.createElement('table');
    table.className = 'dims-grid';

    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');

    this.columns.forEach(column => {
      const th = document.createElement('th');
      const header = document.createElement('span');

      header.className = 'dims-grid-header';

      if (this.filters[column.key]) {
        header.classList.add('active');
      }

      const label = document.createElement('span');
      label.textContent = column.label;
      header.appendChild(label);

      if (column.filterable !== false) {
        const arrow = document.createElement('span');
        arrow.className = 'dims-grid-arrow';
        arrow.textContent = '▾';
        header.appendChild(arrow);

        header.onclick = event => {
          event.stopPropagation();
          this.openFilterMenu(column, header);
        };
      }

      th.appendChild(header);
      headRow.appendChild(th);
    });

    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');

    data.forEach((row, index) => {
      const tr = document.createElement('tr');

      this.columns.forEach(column => {
        const td = document.createElement('td');

        if (typeof column.render === 'function') {
          td.innerHTML = column.render(row, index);
        } else {
          td.textContent = this.getCellValue(row, column);
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    wrapper.appendChild(table);
    this.container.appendChild(wrapper);
  }
}

let projectsGrid;
let tasksGrid;

async function loadProjects() {
  const { data, error } = await sb
    .from('projects')
    .select('*')
    .order('created_at', { ascending: false });

  const container = document.getElementById('projectsList');

  if (error) {
    container.innerHTML =
      `<span class="loading">${esc(error.message)}</span>`;
    return;
  }

  const rows = data || [];

  document.getElementById('projCount').textContent =
    `(${rows.length})`;

  const columns = [
    {
      key: 'project_number',
      label: 'Project No.',
      value: project => project.project_number || '—',
      render: project =>
        `<span class="permanent-number">${esc(project.project_number || '—')}</span>`
    },
    {
      key: 'title',
      label: 'Project',
      render: project =>
        `<strong>${esc(project.title)}</strong>` +
        (
          project.description
            ? `<div class="row-meta">${esc(project.description)}</div>`
            : ''
        )
    },
    {
      key: 'stream',
      label: 'Stream',
      value: project => project.stream || '—'
    },
    {
      key: 'status',
      label: 'Status',
      value: project => project.status || 'open',
      render: project => badge(project.status || 'open')
    },
    {
      key: 'priority',
      label: 'Priority',
      value: project => project.priority || 'medium',
      render: project => priorityBadge(project.priority)
    },
    {
      key: 'project_type',
      label: 'Project Type',
      value: project => project.project_type || 'operational'
    },
    {
      key: 'start_date',
      label: 'Start',
      value: project => fmt(project.start_date)
    },
    {
      key: 'target_date',
      label: 'Target',
      value: project => fmt(project.target_date)
    },
    {
      key: 'percent_complete',
      label: 'Progress',
      value: project => project.percent_complete || 0,
      render: project =>
        `<div class="progress-bar">` +
        `<div class="progress-fill" style="width:${Number(project.percent_complete) || 0}%"></div>` +
        `</div>` +
        `<div class="row-meta">${Number(project.percent_complete) || 0}%</div>`
    }
  ];

  if (!projectsGrid) {
    projectsGrid = new DIMSGrid({
      container: '#projectsList',
      searchInput: '#projectSearch',
      columns,
      rows
    });
  } else {
    projectsGrid.setRows(rows);
  }
}

async function loadTasks() {
  const { data, error } = await sb
    .from('tasks')
    .select('*')
    .order('created_at', { ascending: false });

  const container = document.getElementById('tasksList');

  if (error) {
    container.innerHTML =
      `<span class="loading">${esc(error.message)}</span>`;
    return;
  }

  const rows = data || [];

  document.getElementById('taskCount').textContent =
    `(${rows.length})`;

  const columns = [
    {
      key: 'task_number',
      label: 'Task No.',
      value: task => task.task_number || '—',
      render: task =>
        `<span class="permanent-number">${esc(task.task_number || '—')}</span>`
    },
    {
      key: 'title',
      label: 'Task',
      render: task => `<strong>${esc(task.title)}</strong>`
    },
    {
      key: 'status',
      label: 'Status',
      value: task => task.status || 'open',
      render: task => badge(task.status || 'open')
    },
    {
      key: 'priority',
      label: 'Priority',
      value: task => task.priority || 'medium',
      render: task => priorityBadge(task.priority)
    },
    {
      key: 'task_type',
      label: 'Task Type',
      value: task => task.task_type || 'operational'
    },
    {
      key: 'start_date',
      label: 'Start',
      value: task => fmt(task.start_date)
    },
    {
      key: 'target_date',
      label: 'Target',
      value: task => fmt(task.target_date)
    },
    {
      key: 'percent_complete',
      label: 'Progress',
      value: task => task.percent_complete || 0,
      render: task =>
        `<div class="progress-bar">` +
        `<div class="progress-fill" style="width:${Number(task.percent_complete) || 0}%"></div>` +
        `</div>` +
        `<div class="row-meta">${Number(task.percent_complete) || 0}%</div>`
    },
    {
      key: 'notes',
      label: 'Notes',
      value: task => task.notes || '—'
    }
  ];

  if (!tasksGrid) {
    tasksGrid = new DIMSGrid({
      container: '#tasksList',
      searchInput: '#taskSearch',
      columns,
      rows
    });
  } else {
    tasksGrid.setRows(rows);
  }
}

window.saveProject = async function() {
  const title = document.getElementById('p_title').value.trim();
  const message = document.getElementById('pMsg');

  if (!title) {
    message.textContent = 'Title required.';
    return;
  }

  const { error } = await sb
    .from('projects')
    .insert({
      title,
      description: document.getElementById('p_desc').value,
      status: document.getElementById('p_status').value,
      priority: document.getElementById('p_priority').value,
      stream: document.getElementById('p_stream').value,
      created_at: new Date().toISOString()
    });

  message.textContent = error
    ? `Error: ${error.message}`
    : 'Saved ✅';

  if (!error) {
    ['p_title', 'p_desc', 'p_stream'].forEach(
      id => document.getElementById(id).value = ''
    );

    loadProjects();
  }
};

window.saveTask = async function() {
  const title = document.getElementById('t_title').value.trim();
  const message = document.getElementById('tMsg');

  if (!title) {
    message.textContent = 'Title required.';
    return;
  }

  const { error } = await sb
    .from('tasks')
    .insert({
      title,
      notes: document.getElementById('t_notes').value,
      status: document.getElementById('t_status').value,
      priority: document.getElementById('t_priority').value,
      created_at: new Date().toISOString()
    });

  message.textContent = error
    ? `Error: ${error.message}`
    : 'Saved ✅';

  if (!error) {
    ['t_title', 't_notes'].forEach(
      id => document.getElementById(id).value = ''
    );

    loadTasks();
  }
};

Promise.all([
  loadProjects(),
  loadTasks()
]);

</script>
