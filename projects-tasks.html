import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
class DIMSGrid {
  constructor(options){
    this.container = typeof options.container === 'string'
      ? document.querySelector(options.container)
      : options.container;

    this.columns = options.columns || [];
    this.rows = options.rows || [];
    this.searchInput = options.searchInput
      ? document.querySelector(options.searchInput)
      : null;

    this.filters = {};
    this.sort = { key: null, direction: 'asc' };
    this.menu = null;

    if (!this.container) {
      throw new Error('DIMSGrid container not found.');
    }

    this.onDocumentClick = this.onDocumentClick.bind(this);
    document.addEventListener('click', this.onDocumentClick);

    if (this.searchInput) {
      this.searchInput.addEventListener('input', () => this.render());
    }

    this.render();
  }

  setRows(rows){
    this.rows = Array.isArray(rows) ? rows : [];
    this.render();
  }

  onDocumentClick(event){
    if (
      this.menu &&
      !this.menu.contains(event.target) &&
      !event.target.closest('.dims-grid-header')
    ) {
      this.closeMenu();
    }
  }

  getCellValue(row, column){
    if (typeof column.value === 'function') {
      return column.value(row);
    }
    return row[column.key] ?? '';
  }

  getFilteredRows(){
    const query = String(this.searchInput?.value || '').trim().toLowerCase();

    let data = this.rows.filter(row => {
      const searchMatch = !query || this.columns.some(column => {
        return String(this.getCellValue(row, column))
          .toLowerCase()
          .includes(query);
      });

      if (!searchMatch) return false;

      return Object.entries(this.filters).every(([key, expected]) => {
        const column = this.columns.find(item => item.key === key);
        if (!column) return true;

        const actual = String(this.getCellValue(row, column)).toLowerCase();
        return actual === String(expected).toLowerCase();
      });
    });

    if (this.sort.key) {
      const column = this.columns.find(item => item.key === this.sort.key);

      data = [...data].sort((a, b) => {
        const av = this.getCellValue(a, column);
        const bv = this.getCellValue(b, column);

        const an = Number(av);
        const bn = Number(bv);

        let result;

        if (
          av !== '' &&
          bv !== '' &&
          !Number.isNaN(an) &&
          !Number.isNaN(bn)
        ) {
          result = an - bn;
        } else {
          result = String(av).localeCompare(
            String(bv),
            undefined,
            { numeric: true, sensitivity: 'base' }
          );
        }

        return this.sort.direction === 'asc' ? result : -result;
      });
    }

    return data;
  }

  openFilterMenu(column, headerElement){
    this.closeMenu();

    const values = [...new Set(
      this.rows
        .map(row => String(this.getCellValue(row, column)).trim())
        .filter(Boolean)
    )].sort((a, b) =>
      a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' })
    );

    const menu = document.createElement('div');
    menu.className = 'dims-grid-menu';

    const sortAsc = document.createElement('button');
    sortAsc.textContent = 'Sort A → Z';
    sortAsc.onclick = () => {
      this.sort = { key: column.key, direction: 'asc' };
      this.closeMenu();
      this.render();
    };
    menu.appendChild(sortAsc);

    const sortDesc = document.createElement('button');
    sortDesc.textContent = 'Sort Z → A';
    sortDesc.onclick = () => {
      this.sort = { key: column.key, direction: 'desc' };
      this.closeMenu();
      this.render();
    };
    menu.appendChild(sortDesc);

    values.forEach(value => {
      const button = document.createElement('button');
      button.textContent =
        String(this.filters[column.key] ?? '') === value
          ? `✓ ${value}`
          : value;

      button.onclick = () => {
        this.filters[column.key] = value;
        this.closeMenu();
        this.render();
      };

      menu.appendChild(button);
    });

    const clear = document.createElement('button');
    clear.className = 'dims-grid-clear';
    clear.textContent = 'Clear filter';
    clear.onclick = () => {
      delete this.filters[column.key];
      this.closeMenu();
      this.render();
    };
    menu.appendChild(clear);

    document.body.appendChild(menu);

    const rect = headerElement.getBoundingClientRect();
    const left = Math.min(
      rect.left,
      window.innerWidth - menu.offsetWidth - 12
    );

    menu.style.left = `${Math.max(8, left)}px`;
    menu.style.top = `${rect.bottom + 5}px`;

    this.menu = menu;
  }

  closeMenu(){
    if (this.menu) {
      this.menu.remove();
      this.menu = null;
    }
  }

  render(){
    const data = this.getFilteredRows();

    const wrapper = document.createElement('div');
    wrapper.className = 'dims-grid-wrap';

    const table = document.createElement('table');
    table.className = 'dims-grid';

    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');

    this.columns.forEach(column => {
      const th = document.createElement('th');
      const header = document.createElement('span');

      header.className = 'dims-grid-header';

      if (this.filters[column.key]) {
        header.classList.add('active');
      }

      const label = document.createElement('span');
      label.textContent = column.label;
      header.appendChild(label);

      if (column.filterable !== false) {
        const arrow = document.createElement('span');
        arrow.className = 'dims-grid-arrow';
        arrow.textContent = '▾';
        header.appendChild(arrow);

        header.onclick = event => {
          event.stopPropagation();
          this.openFilterMenu(column, header);
        };
      }

      th.appendChild(header);
      headRow.appendChild(th);
    });

    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');

    data.forEach((row, index) => {
      const tr = document.createElement('tr');

      this.columns.forEach(column => {
        const td = document.createElement('td');

        if (typeof column.render === 'function') {
          td.innerHTML = column.render(row, index);
        } else {
          td.textContent = this.getCellValue(row, column);
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    wrapper.appendChild(table);

    this.container.innerHTML = '';

    if (!data.length) {
      const empty = document.createElement('div');
      empty.className = 'dims-grid-empty';
      empty.textContent = 'No matching records found.';
      this.container.appendChild(empty);
      return;
    }

    this.container.appendChild(wrapper);
  }
}

function esc(value){
  return String(value ?? '').replace(
    /[&<>"]/g,
    character => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;'
    }[character])
  );
}

function fmt(value){
  return value ? new Date(value).toLocaleDateString() : '—';
}

function badge(status){
  const value = String(status || '').toLowerCase();

  if (value.includes('active') || value.includes('progress')) {
    return `<span class="badge badge-amber">${esc(status)}</span>`;
  }

  if (value.includes('complete')) {
    return `<span class="badge badge-blue">${esc(status)}</span>`;
  }

  if (value.includes('deferred')) {
    return `<span class="badge badge-grey">${esc(status)}</span>`;
  }

  return `<span class="badge badge-green">${esc(status || 'open')}</span>`;
}

function priorityBadge(priority){
  const value = String(priority || '').toLowerCase();

  if (value === 'high') {
    return '<span class="badge badge-amber">👑 High</span>';
  }

  if (value === 'low') {
    return '<span class="badge badge-grey">Low</span>';
  }

  return '<span class="badge badge-blue">Medium</span>';
}

let projectsGrid;
let tasksGrid;

async function loadProjects(){
  const { data, error } = await sb
    .from('projects')
    .select('*')
    .order('created_at', { ascending:false });

  const container = document.getElementById('projectsList');

  if (error) {
    container.innerHTML =
      `<span class="loading">${esc(error.message)}</span>`;
    return;
  }

  const rows = data || [];

  document.getElementById('projCount').textContent =
    `(${rows.length})`;

  const columns = [
    {
      key:'title',
      label:'Project',
      render:project =>
        `<strong>${esc(project.title)}</strong>` +
        (
          project.description
            ? `<div class="row-meta">${esc(project.description)}</div>`
            : ''
        )
    },
    {
      key:'stream',
      label:'Stream',
      value:project => project.stream || '—'
    },
    {
      key:'status',
      label:'Status',
      value:project => project.status || 'open',
      render:project => badge(project.status || 'open')
    },
    {
      key:'priority',
      label:'Priority',
      value:project => project.priority || 'medium',
      render:project => priorityBadge(project.priority)
    },
    {
      key:'project_type',
      label:'Project Type',
      value:project => project.project_type || 'operational'
    },
    {
      key:'start_date',
      label:'Start',
      value:project => fmt(project.start_date)
    },
    {
      key:'target_date',
      label:'Target',
      value:project => fmt(project.target_date)
    },
    {
      key:'percent_complete',
      label:'Progress',
      value:project => project.percent_complete || 0,
      render:project =>
        `<div class="progress-bar">` +
        `<div class="progress-fill" style="width:${project.percent_complete || 0}%"></div>` +
        `</div>` +
        `<div class="row-meta">${project.percent_complete || 0}%</div>`
    }
  ];

  if (!projectsGrid) {
    projectsGrid = new DIMSGrid({
      container:'#projectsList',
      searchInput:'#projectSearch',
      columns,
      rows
    });
  } else {
    projectsGrid.setRows(rows);
  }
}

async function loadTasks(){
  const { data, error } = await sb
    .from('tasks')
    .select('*')
    .order('created_at', { ascending:false });

  const container = document.getElementById('tasksList');

  if (error) {
    container.innerHTML =
      `<span class="loading">${esc(error.message)}</span>`;
    return;
  }

  const rows = data || [];

  document.getElementById('taskCount').textContent =
    `(${rows.length})`;

  const columns = [
    {
      key:'title',
      label:'Task',
      render:task => `<strong>${esc(task.title)}</strong>`
    },
    {
      key:'status',
      label:'Status',
      value:task => task.status || 'open',
      render:task => badge(task.status || 'open')
    },
    {
      key:'priority',
      label:'Priority',
      value:task => task.priority || 'medium',
      render:task => priorityBadge(task.priority)
    },
    {
      key:'task_type',
      label:'Task Type',
      value:task => task.task_type || 'operational'
    },
    {
      key:'start_date',
      label:'Start',
      value:task => fmt(task.start_date)
    },
    {
      key:'target_date',
      label:'Target',
      value:task => fmt(task.target_date)
    },
    {
      key:'percent_complete',
      label:'Progress',
      value:task => task.percent_complete || 0,
      render:task =>
        `<div class="progress-bar">` +
        `<div class="progress-fill" style="width:${task.percent_complete || 0}%"></div>` +
        `</div>` +
        `<div class="row-meta">${task.percent_complete || 0}%</div>`
    },
    {
      key:'notes',
      label:'Notes',
      value:task => task.notes || '—'
    }
  ];

  if (!tasksGrid) {
    tasksGrid = new DIMSGrid({
      container:'#tasksList',
      searchInput:'#taskSearch',
      columns,
      rows
    });
  } else {
    tasksGrid.setRows(rows);
  }
}

window.saveProject = async function(){
  const title =
    document.getElementById('p_title').value.trim();

  if (!title) {
    document.getElementById('pMsg').textContent =
      'Title required.';
    return;
  }

  const { error } = await sb
    .from('projects')
    .insert({
      title,
      description:document.getElementById('p_desc').value,
      status:document.getElementById('p_status').value,
      priority:document.getElementById('p_priority').value,
      stream:document.getElementById('p_stream').value,
      created_at:new Date().toISOString()
    });

  document.getElementById('pMsg').textContent =
    error
      ? `Error: ${error.message}`
      : 'Saved ✅';

  if (!error) {
    ['p_title','p_desc','p_stream'].forEach(
      id => document.getElementById(id).value = ''
    );

    loadProjects();
  }
};

window.saveTask = async function(){
  const title =
    document.getElementById('t_title').value.trim();

  if (!title) {
    document.getElementById('tMsg').textContent =
      'Title required.';
    return;
  }

  const { error } = await sb
    .from('tasks')
    .insert({
      title,
      notes:document.getElementById('t_notes').value,
      status:document.getElementById('t_status').value,
      priority:document.getElementById('t_priority').value,
      created_at:new Date().toISOString()
    });

  document.getElementById('tMsg').textContent =
    error
      ? `Error: ${error.message}`
      : 'Saved ✅';

  if (!error) {
    ['t_title','t_notes'].forEach(
      id => document.getElementById(id).value = ''
    );

    loadTasks();
  }
};

Promise.all([
  loadProjects(),
  loadTasks()
]);
