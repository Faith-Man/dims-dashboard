<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OrEl Content Studio</title>
<style>
:root{
  --blue:#0C1475;
  --gold:#FFD700;
  --bg:#eef5ff;
  --card:#ffffff;
  --line:#c8d8ff;
  --text:#0b1733;
  --muted:#5b6b8d;
}
*{box-sizing:border-box}
body{font-family:system-ui,Arial;margin:0;background:var(--bg);color:var(--text)}
header{background:var(--blue);color:white;padding:18px}
main{max-width:1200px;margin:0 auto;padding:16px}
.grid{display:grid;grid-template-columns:340px 1fr;gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
input,textarea,select{width:100%;padding:10px;margin:6px 0;border:1px solid var(--line);border-radius:9px}
textarea{min-height:150px}
#content_md{min-height:300px}
button{background:var(--blue);color:white;border:0;border-radius:10px;padding:10px 14px;margin:4px;cursor:pointer}
button:hover{outline:2px solid var(--gold)}
.toolbar{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.dropdown{position:relative;display:inline-block}
.dropdown-content{display:none;position:absolute;background:white;border:1px solid var(--line);border-radius:10px;min-width:180px;z-index:10;box-shadow:0 6px 16px rgba(0,0,0,.12)}
.dropdown-content button{display:block;width:100%;text-align:left;background:white;color:var(--text);border-radius:0;margin:0}
.dropdown-content button:hover{background:#f4f8ff;outline:none}
.dropdown:hover .dropdown-content{display:block}
.item{padding:12px;border-bottom:1px solid #ddd;cursor:pointer}
.item:hover{background:#f4f8ff}
.item-type{font-weight:700;color:var(--blue);display:block;margin-bottom:4px}
.item-title{font-weight:700;display:block}
.small{color:var(--muted);font-size:.9rem}
.preview{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:14px;display:none;white-space:pre-wrap;line-height:1.55}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
@media print{
  header,.grid .card:first-child,.toolbar,input,select,textarea,#msg{display:none!important}
  body{background:white}
  .preview{display:block!important;border:0}
}
</style>
</head>
<body>
<header>
<h1>💡 OrEl Content Studio</h1>
<div>DIMS-v3 • Dominion1st Content Management System</div>
</header>

<main>
<div class="grid">

<section class="card">
<h2>📚 Content Library</h2>
<input id="search" placeholder="Search content...">
<div id="list">Loading...</div>
</section>

<section class="card">
<h2>✍ Content Editor</h2>

<input id="title" placeholder="Title">
<input id="slug" placeholder="slug-auto-created">

<select id="status">
<option value="draft">Draft</option>
<option value="published">Published</option>
<option value="archived">Archived</option>
</select>

<select id="content_type">
<option value="Teaching">📖 Teaching</option>
<option value="Diagnosis">🩺 Diagnosis</option>
<option value="Perspective">👁️ Perspective</option>
<option value="Principle">🏛️ Principle</option>
<option value="Briefing">🎙️ Briefing</option>
</select>

<select id="category">
<option value="">Select Category</option>
<option value="Identity">Identity</option>
<option value="Dominion">Dominion</option>
<option value="Kingdom">Kingdom</option>
<option value="Grace">Grace</option>
<option value="Faith">Faith</option>
<option value="Leadership">Leadership</option>
<option value="Culture">Culture</option>
<option value="Prophecy">Prophecy</option>
<option value="End Times">End Times</option>
<option value="Character">Character</option>
<option value="Other">Other</option>
</select>

<input id="series" placeholder="Series Name">
<input id="tags" placeholder="tags separated by commas">
<textarea id="summary" placeholder="Executive Summary (optional)"></textarea>
<textarea id="content_md" placeholder="Write content here..."></textarea>

<div class="toolbar">
<button onclick="newTeaching()">New</button>
<button onclick="saveTeaching('draft')">💾 Save</button>
<button onclick="saveTeaching('published')">🚀 Publish</button>
<button onclick="previewContent()">👁 Preview</button>
<button onclick="printContent()">🖨 Print</button>

<div class="dropdown">
<button>📤 Export ▼</button>
<div class="dropdown-content">
<button onclick="exportMarkdown()">📄 Markdown</button>
<button onclick="exportJSON()">📋 JSON</button>
<button onclick="exportHTML()">🌐 HTML</button>
</div>
</div>

<div class="dropdown">
<button>⋮ More ▼</button>
<div class="dropdown-content">
<button onclick="archiveTeaching()">📦 Archive</button>
<button onclick="duplicateTeaching()">📑 Duplicate</button>
<button onclick="deleteTeaching()">🗑 Delete</button>
</div>
</div>
</div>

<p id="msg" class="small"></p>
<div id="preview" class="preview"></div>

</section>
</div>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://sdquzhsylqpbhrmqjqgk.supabase.co',
  'sb_publishable_volaz6N52Pc4rdh8a4dfEw_MjJ73How'
);

let teachings = [];
let currentId = null;

window.newTeaching = newTeaching;
window.saveTeaching = saveTeaching;
window.archiveTeaching = archiveTeaching;
window.deleteTeaching = deleteTeaching;
window.duplicateTeaching = duplicateTeaching;
window.previewContent = previewContent;
window.printContent = printContent;
window.exportMarkdown = exportMarkdown;
window.exportJSON = exportJSON;
window.exportHTML = exportHTML;

function slugify(s){
  return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}

function esc(s){
  return String(s ?? '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function typeIcon(type){
  if(type === 'Diagnosis') return '🩺';
  if(type === 'Perspective') return '👁️';
  if(type === 'Principle') return '🏛️';
  if(type === 'Briefing') return '🎙️';
  return '📖';
}

function getEditorData(){
  return {
    id: currentId,
    title: document.getElementById('title').value.trim(),
    slug: document.getElementById('slug').value.trim(),
    status: document.getElementById('status').value,
    content_type: document.getElementById('content_type').value,
    category: document.getElementById('category').value,
    series: document.getElementById('series').value.trim(),
    tags: document.getElementById('tags').value.split(',').map(x=>x.trim()).filter(Boolean),
    summary: document.getElementById('summary').value.trim(),
    content_md: document.getElementById('content_md').value
  };
}

async function loadTeachings(){
  const {data,error}=await supabase
    .from('teachings')
    .select('*')
    .order('updated_at',{ascending:false});

  if(error){
    document.getElementById('list').textContent='Error: '+error.message;
    return;
  }

  teachings=data||[];
  renderList();
}

function renderList(){
  const q=document.getElementById('search').value.toLowerCase().trim();

  const filtered=teachings.filter(t=>{
    const text=[
      t.title,t.status,t.content_type,t.category,t.series,t.summary,
      ...(t.tags||[]),t.content_md
    ].join(' ').toLowerCase();

    return !q || text.includes(q);
  });

  if(!filtered.length){
    document.getElementById('list').innerHTML='<div class="small">No content found.</div>';
    return;
  }

  document.getElementById('list').innerHTML=filtered.map(t=>`
    <div class="item" data-id="${esc(t.id)}">
      <span class="item-type">${typeIcon(t.content_type)} ${esc(t.content_type||'Teaching')}</span>
      <span class="item-title">${esc(t.title||'Untitled')}</span>
      <span class="small">${esc(t.status||'draft')} · ${esc(t.category||'Uncategorized')} · ${esc(t.series||'Standalone')}</span>
    </div>
  `).join('');

  document.querySelectorAll('.item').forEach(el=>{
    el.onclick=()=>{
      const t=teachings.find(x=>String(x.id)===el.dataset.id);
      fillEditor(t);
    };
  });
}

function fillEditor(t){
  currentId=t.id;
  document.getElementById('title').value=t.title||'';
  document.getElementById('slug').value=t.slug||t.id||'';
  document.getElementById('status').value=t.status||'draft';
  document.getElementById('content_type').value=t.content_type||'Teaching';
  document.getElementById('category').value=t.category||'';
  document.getElementById('series').value=t.series||'';
  document.getElementById('tags').value=(t.tags||[]).join(', ');
  document.getElementById('summary').value=t.summary||'';
  document.getElementById('content_md').value=t.content_md||'';
  document.getElementById('preview').style.display='none';
  document.getElementById('msg').textContent='Loaded.';
}

function newTeaching(){
  currentId=null;
  document.getElementById('title').value='';
  document.getElementById('slug').value='';
  document.getElementById('status').value='draft';
  document.getElementById('content_type').value='Teaching';
  document.getElementById('category').value='';
  document.getElementById('series').value='';
  document.getElementById('tags').value='';
  document.getElementById('summary').value='';
  document.getElementById('content_md').value='';
  document.getElementById('preview').style.display='none';
  document.getElementById('msg').textContent='New content.';
}

function cleanTitleForSummary(title){
  return String(title||'')
    .replace(/DOMINION1ST™/gi,'')
    .replace(/DOMINION1ST/gi,'')
    .replace(/DIAGNOSIS/gi,'')
    .replace(/PERSPECTIVE/gi,'')
    .replace(/PRINCIPLE/gi,'')
    .replace(/TEACHING/gi,'')
    .replace(/BRIEFING/gi,'')
    .replace(/[-–—]+/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

function generateSmartSummary(title, content){
  const lower = (title + ' ' + content).toLowerCase();

  let type = 'content';
  if(lower.includes('diagnosis')) type = 'Diagnosis';
  else if(lower.includes('perspective')) type = 'Perspective';
  else if(lower.includes('principle')) type = 'Principle';
  else if(lower.includes('brief')) type = 'Briefing';
  else if(lower.includes('teaching')) type = 'Teaching';

  let focus = 'truth, dominion, and Kingdom understanding';
  if(lower.includes('faith')) focus = 'faith, courage, and spiritual conviction';
  if(lower.includes('justice') || lower.includes('accountability')) focus = 'truth, justice, accountability, and discernment';
  if(lower.includes('identity') || lower.includes('image') || lower.includes('likeness')) focus = 'identity, purpose, and dominion';
  if(lower.includes('history') || lower.includes('erased') || lower.includes('memory')) focus = 'historical memory, truth, power, and accountability';
  if(lower.includes('grace') || lower.includes('mercy')) focus = 'grace, mercy, and the character of God';
  if(lower.includes('honor')) focus = 'honor, character, order, and Kingdom conduct';

  const cleanTitle = cleanTitleForSummary(title) || 'this subject';

  return `This Dominion1st ${type} examines ${focus}, using "${cleanTitle}" as the central theme. It is designed to help readers see the issue clearly, understand the underlying principles, and respond with wisdom, conviction, and Kingdom-minded action.`;
}

function autoFillMetadata(){
  const title=document.getElementById('title').value.trim();
  const content=document.getElementById('content_md').value.trim();
  const all=(title+' '+content).toLowerCase();
  const titleUpper=title.toUpperCase();

  if(title && !document.getElementById('slug').value.trim()){
    document.getElementById('slug').value=slugify(title);
  }

  if(titleUpper.includes('DIAGNOSIS')){
    document.getElementById('content_type').value='Diagnosis';
  } else if(titleUpper.includes('PERSPECTIVE')){
    document.getElementById('content_type').value='Perspective';
  } else if(titleUpper.includes('PRINCIPLE')){
    document.getElementById('content_type').value='Principle';
  } else if(titleUpper.includes('BRIEF')){
    document.getElementById('content_type').value='Briefing';
  }

  if(!document.getElementById('summary').value.trim() && (title || content)){
    document.getElementById('summary').value = generateSmartSummary(title, content);
  }

  if(!document.getElementById('category').value){
    if(all.includes('identity')||all.includes('image')||all.includes('likeness')) document.getElementById('category').value='Identity';
    else if(all.includes('dominion')||all.includes('authority')||all.includes('rule')) document.getElementById('category').value='Dominion';
    else if(all.includes('grace')||all.includes('mercy')) document.getElementById('category').value='Grace';
    else if(all.includes('faith')||all.includes('believe')) document.getElementById('category').value='Faith';
    else if(all.includes('culture')||all.includes('government')||all.includes('society')||all.includes('justice')) document.getElementById('category').value='Culture';
    else if(all.includes('prophecy')||all.includes('prophetic')) document.getElementById('category').value='Prophecy';
    else if(all.includes('leadership')||all.includes('leader')) document.getElementById('category').value='Leadership';
    else document.getElementById('category').value='Other';
  }

  if(!document.getElementById('series').value.trim()){
    if(all.includes('the connection')) document.getElementById('series').value='The Connection';
    else if(all.includes('perfect man')) document.getElementById('series').value='The Perfect Man';
    else if(all.includes('divine design')) document.getElementById('series').value="God's Divine Design";
    else if(all.includes('dominion revolution')) document.getElementById('series').value='The Dominion Revolution';
    else document.getElementById('series').value='Standalone';
  }

  if(!document.getElementById('tags').value.trim()){
    const tags=[];
    ['identity','dominion','faith','grace','mercy','truth','justice','kingdom','culture','leadership','prophecy','authority','purpose','honor','accountability','discernment'].forEach(k=>{
      if(all.includes(k)) tags.push(k);
    });
    document.getElementById('tags').value=[...new Set(tags)].join(', ');
  }
}

async function saveTeaching(forceStatus){
  autoFillMetadata();

  const d=getEditorData();
  const title=d.title;
  const slug=d.slug || slugify(title);
  const status=forceStatus || d.status;

  if(!title){
    document.getElementById('msg').textContent='Title is required.';
    return;
  }

  const row={
    id: currentId || slug,
    slug,
    title,
    status,
    content_type:d.content_type,
    category:d.category,
    series:d.series,
    tags:d.tags,
    summary:d.summary,
    content_md:d.content_md,
    published_date: status === 'published' ? new Date().toISOString().slice(0,10) : null,
    archived_at: status === 'archived' ? new Date().toISOString() : null,
    updated_at:new Date().toISOString()
  };

  document.getElementById('msg').textContent='Saving...';

  const {error}=await supabase
    .from('teachings')
    .upsert(row,{onConflict:'id'});

  if(error){
    document.getElementById('msg').textContent='Error: '+error.message;
    return;
  }

  currentId=row.id;
  document.getElementById('slug').value=slug;
  document.getElementById('status').value=status;
  document.getElementById('msg').textContent=status==='published'?'Published ✅':'Saved ✅';
  await loadTeachings();
}

async function archiveTeaching(){
  if(!currentId){
    document.getElementById('msg').textContent='No content selected.';
    return;
  }
  document.getElementById('status').value='archived';
  await saveTeaching('archived');
}

async function deleteTeaching(){
  if(!currentId){
    document.getElementById('msg').textContent='No content selected.';
    return;
  }

  if(!confirm('Delete this content? This cannot be undone.')) return;

  const {error}=await supabase.from('teachings').delete().eq('id',currentId);

  if(error){
    document.getElementById('msg').textContent='Error: '+error.message;
    return;
  }

  newTeaching();
  document.getElementById('msg').textContent='Deleted.';
  await loadTeachings();
}

function duplicateTeaching(){
  const d=getEditorData();

  if(!d.title){
    document.getElementById('msg').textContent='Load or create content before duplicating.';
    return;
  }

  currentId=null;
  const newTitle=d.title + ' (Copy)';
  document.getElementById('title').value=newTitle;
  document.getElementById('slug').value=slugify(newTitle);
  document.getElementById('status').value='draft';
  document.getElementById('msg').textContent='Duplicated as draft. Save when ready.';
}

function previewContent(){
  const d=getEditorData();
  const html=`<h1>${esc(d.title||'Untitled')}</h1>
<p><strong>${typeIcon(d.content_type)} ${esc(d.content_type)}</strong> · ${esc(d.category||'Uncategorized')} · ${esc(d.series||'Standalone')}</p>
<p><em>${esc(d.summary||'')}</em></p>
<hr>
<div>${esc(d.content_md||'').replace(/\n/g,'<br>')}</div>`;
  const box=document.getElementById('preview');
  box.innerHTML=html;
  box.style.display='block';
}

function printContent(){
  previewContent();
  window.print();
}

function download(filename,text,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type}));
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function exportMarkdown(){
  const d=getEditorData();
  const name=d.slug||slugify(d.title)||'content';
  const md=`# ${d.title}

**Type:** ${d.content_type}  
**Category:** ${d.category}  
**Series:** ${d.series}  
**Status:** ${d.status}  
**Tags:** ${d.tags.join(', ')}

## Executive Summary

${d.summary}

---

${d.content_md}`;
  download(name+'.md',md,'text/markdown');
}

function exportJSON(){
  const d=getEditorData();
  const name=d.slug||slugify(d.title)||'content';
  download(name+'.json',JSON.stringify(d,null,2),'application/json');
}

function exportHTML(){
  const d=getEditorData();
  const name=d.slug||slugify(d.title)||'content';
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>${esc(d.title)}</title></head><body>
<h1>${esc(d.title)}</h1>
<p><strong>${typeIcon(d.content_type)} ${esc(d.content_type)}</strong> · ${esc(d.category)} · ${esc(d.series)}</p>
<p><em>${esc(d.summary)}</em></p>
<hr>
<div>${esc(d.content_md).replace(/\n/g,'<br>')}</div>
</body></html>`;
  download(name+'.html',html,'text/html');
}

document.getElementById('title').addEventListener('input',()=>{
  const slug=document.getElementById('slug');
  if(!slug.value.trim()) slug.value=slugify(document.getElementById('title').value);
});

document.getElementById('search').addEventListener('input',renderList);

loadTeachings();
</script>
</body>
</html>
