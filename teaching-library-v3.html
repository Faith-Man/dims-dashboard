<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DIMS Teaching Library v3</title>
  <style>
    body{font-family:system-ui,Arial;margin:0;background:#eef5ff;color:#0b1733}
    header{background:#0C1475;color:white;padding:18px}
    main{max-width:1000px;margin:0 auto;padding:16px}
    input{width:100%;padding:12px;border-radius:10px;border:1px solid #c8d8ff;margin:12px 0}
    .grid{display:grid;grid-template-columns:320px 1fr;gap:14px}
    .card{background:white;border:1px solid #c8d8ff;border-radius:14px;padding:14px}
    .item{padding:10px;border-bottom:1px solid #ddd;cursor:pointer}
    .item:hover{background:#f4f8ff}
    .muted{color:#5b6b8d;font-size:.9rem}
    pre{white-space:pre-wrap;font-family:inherit;line-height:1.55}
    @media(max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <h1>📚 DIMS Teaching Library</h1>
  <div>Dominion1st Integrated Management System</div>
</header>

<main>
  <input id="search" placeholder="Search teachings by title, tag, or content...">

  <div class="grid">
    <section class="card">
      <h2>Teachings</h2>
      <div id="list">Loading...</div>
    </section>

    <section class="card">
      <h2 id="title">Select a Teaching</h2>
      <div id="meta" class="muted"></div>
      <pre id="body">Teaching content will appear here.</pre>
    </section>
  </div>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://sdquzhsylqpbhrmqjqgk.supabase.co',
  'sb_publishable_volaz6N52Pc4rdh8a4dfEw_MjJ73How'
);

let teachings = [];

function esc(s){
  return String(s ?? '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function renderList(){
  const q = document.getElementById('search').value.toLowerCase().trim();

  const filtered = teachings.filter(t => {
    const haystack = [
      t.title,
      t.status,
      t.priority,
      ...(t.tags || []),
      t.content_md
    ].join(' ').toLowerCase();

    return !q || haystack.includes(q);
  });

  const list = document.getElementById('list');

  if (!filtered.length) {
    list.innerHTML = '<div class="muted">No teachings found.</div>';
    return;
  }

  list.innerHTML = filtered.map(t => `
    <div class="item" data-id="${esc(t.id)}">
      <strong>${esc(t.title)}</strong><br>
      <span class="muted">${esc(t.status || '')} · ${esc(t.priority || '')} · ${(t.tags || []).join(', ')}</span>
    </div>
  `).join('');

  list.querySelectorAll('.item').forEach(el => {
    el.onclick = () => {
      const t = teachings.find(x => String(x.id) === el.dataset.id);
      document.getElementById('title').textContent = t.title || 'Untitled';
      document.getElementById('meta').textContent =
        `${t.status || ''} · ${t.priority || ''} · ${(t.tags || []).join(', ')}`;
      document.getElementById('body').textContent = t.content_md || '';
    };
  });
}

async function loadTeachings(){
  const { data, error } = await supabase
    .from('teachings')
    .select('*')
    .order('updated_at', { ascending:false });

  if (error) {
    document.getElementById('list').textContent = 'Error: ' + error.message;
    return;
  }

  teachings = data || [];
  renderList();
}

document.getElementById('search').addEventListener('input', renderList);

loadTeachings();
</script>
</body>
</html>
